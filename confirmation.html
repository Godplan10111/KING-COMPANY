<!DOCTYPE html>
<html>

  <head>
    <title>Login Successful</title>
    <style>

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .card {
        background: #0066cc;
        border-radius: 50px;
        padding: 40px 50px;
        text-align: center;
        width: 100%;
        max-width: 360px;
      }

      .checkmark {
        width: 60px;
        height: 60px;
        background: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        font-size: 30px;
        color: #0066cc;
      }

      .card h2 {
        color: white;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .card p {
        color: #cce0ff;
        font-size: 13px;
        line-height: 1.7;
      }

      .countdown {
        margin-top: 14px;
        color: white;
        font-size: 12px;
        opacity: 0.8;
      }

    </style>
  </head>

  <body>

    <div class="card">

      <div class="checkmark">&#10003;</div>

      <h2>Login Successful</h2>

      <p>You have been logged in.<br>
      You will be redirected in <strong id="count">4</strong> seconds.</p>

      <p class="countdown">If nothing happens, please close the browser.</p>

    </div>

    <script>
      var count = 8;
      var timer = setInterval(function() {
        count--;
        document.getElementById('count').textContent = count;
        if (count === 0) {
          clearInterval(timer);
          window.location.href = 'index.html';
        }
      }, 1000);
    </script>

  </body>

</html>
